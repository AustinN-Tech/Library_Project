{% extends "base.html" %}
{% block title %}Home Page{% endblock %}
{% block content %}
    <main class="library_content">
        <section class="book_list">
            {% for book in books %}
                <article class="book_card">
                    <div class="book_info">
                        <h3 class="book_title">{{book.title.title()}}</h3>
                        <p class="book_author">Author: {{book.author.title()}}</p>
                        <p class="book_genre">Genre: {{book.genre.title()}}</p>
                        <p class="book_year">Date Added: {{book.date_added}}</p>

                        <div class="book_actions">
                            <a href= "{{ url_for('open_book', id=book.id)}}">Open</a>
                            <form action="/delete" method="POST">
                                <input type="hidden" name="book_id" value="{{book.id}}">
                                <button type="submit">Delete</button>
                            </form>
                        </div>
                    </div>

                    <div class="book_cover">
                        <img src="{{ url_for('static', filename=book.cover_path) }}" alt="Cover of {{book.title.title()}}">
                    </div>
                </article>
            {% endfor %}
        </section>
    </main>
{% endblock %}
